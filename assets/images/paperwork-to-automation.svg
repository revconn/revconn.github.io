<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Animation of manual construction paperwork being automated into a fast digital workflow">

  <style>
    :root{}
    .mono{ font-family:'JetBrains Mono','Courier New',monospace; }
    .display{ font-family:'Space Grotesk','Arial',sans-serif; }

    .label-slow{ fill:#B5651D; font-size:13px; letter-spacing:.06em; }
    .label-fast{ fill:#0B2A4A; font-size:13px; letter-spacing:.06em; }

    /* ---- flow line marching ants ---- */
    .flow-line{
      stroke:#9ED4EB; stroke-width:2; fill:none;
      stroke-dasharray:6 8;
      animation:march 1.4s linear infinite;
    }
    @keyframes march{ to{ stroke-dashoffset:-28; } }

    /* ---- gear ---- */
    .gear-rotor{
      transform-box:view-box;
      transform-origin:450px 160px;
      animation:spin 6s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    .tooth{ fill:#0B2A4A; }
    .gear-hub{ fill:#0B2A4A; }
    .gear-hole{ fill:#F3F1E9; }
    .gear-halo{
      fill:none; stroke:#6FB8D9; stroke-width:1.5; stroke-dasharray:3 6; opacity:.55;
    }

    /* ---- static backlog pile (left) ---- */
    .pile-sheet{ fill:#F3F1E9; stroke:#B5651D; stroke-width:1.4; opacity:.55; }
    .pile-line{ stroke:#B5651D; stroke-width:2; opacity:.5; stroke-linecap:round; }

    /* ---- static completed pile (right) ---- */
    .done-card{ fill:#F3F1E9; stroke:#0B2A4A; stroke-width:1.4; }
    .done-check{ stroke:#0B2A4A; stroke-width:2.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }

    /* ---- traveling paper document ---- */
    .doc{
      transform-box:view-box;
      transform-origin:0px 0px;
    }
    .doc-paper{ animation:paperTravel 4s cubic-bezier(.45,0,.55,1) infinite; }
    .doc-paper rect{ fill:#FFFFFF; stroke:#B5651D; stroke-width:1.6; }
    .doc-paper line{ stroke:#B5651D; stroke-width:1.6; opacity:.7; }

    @keyframes paperTravel{
      0%   { transform:translate(0px,0px)   rotate(0deg);   opacity:0; }
      6%   { opacity:1; }
      42%  { transform:translate(230px,-14px) rotate(-6deg); opacity:1; }
      50%  { transform:translate(268px,-8px)  rotate(8deg);  opacity:0; }
      100% { transform:translate(268px,-8px)  rotate(8deg);  opacity:0; }
    }

    /* ---- emerging digital card ---- */
    .doc-card{ animation:cardTravel 4s cubic-bezier(.45,0,.55,1) infinite; }
    .doc-card rect{ fill:#0B2A4A; }
    .doc-card path.check{ stroke:#9ED4EB; stroke-width:2.2; fill:none; stroke-linecap:round; stroke-linejoin:round;
      stroke-dasharray:24; stroke-dashoffset:24;
      animation:drawCheck 4s cubic-bezier(.45,0,.55,1) infinite;
    }

    @keyframes cardTravel{
      0%   { transform:translate(0px,0px) scale(.4); opacity:0; }
      50%  { transform:translate(0px,0px) scale(.4); opacity:0; }
      58%  { transform:translate(18px,0px) scale(.9); opacity:1; }
      92%  { transform:translate(250px,0px) scale(1); opacity:1; }
      100% { transform:translate(268px,0px) scale(1); opacity:0; }
    }
    @keyframes drawCheck{
      0%,55%{ stroke-dashoffset:24; }
      75%   { stroke-dashoffset:0; }
      92%   { stroke-dashoffset:0; }
      100%  { stroke-dashoffset:0; }
    }

    .doc-set-1{ animation-delay:0s; }
    .doc-set-2{ animation-delay:1.333s; }
    .doc-set-3{ animation-delay:2.666s; }

    @media (prefers-reduced-motion: reduce){
      .gear-rotor{ animation-duration:24s; }
      .doc-paper, .doc-card, .doc-card path.check{ animation-play-state:paused; opacity:.85; }
      .flow-line{ animation:none; }
    }
  </style>

  <!-- ================= labels ================= -->
  <text x="60" y="46" class="mono label-slow">MANUAL PAPERWORK &#183; SLOW</text>
  <text x="620" y="46" class="mono label-fast">AUTOMATED WORKFLOW &#183; FAST</text>

  <!-- clock icon (slow) -->
  <g transform="translate(40,32)" stroke="#B5651D" stroke-width="1.6" fill="none">
    <circle cx="0" cy="0" r="9"/>
    <path d="M0 -5V0L3 3"/>
  </g>
  <!-- bolt icon (fast) -->
  <g transform="translate(600,32)" fill="#0B2A4A">
    <path d="M2 -9L-6 3H0L-2 9L7 -3H1L2 -9Z"/>
  </g>

  <!-- ================= flow line ================= -->
  <path class="flow-line" d="M215 160H685" />
  <path d="M675 152L692 160L675 168Z" fill="#6FB8D9" opacity=".7"/>

  <!-- ================= static backlog pile (left) ================= -->
  <g transform="translate(150,180)">
    <g class="pile-sheet" transform="rotate(-6)"><rect x="-34" y="-24" width="68" height="48" rx="2"/></g>
    <g class="pile-sheet" transform="rotate(3)"><rect x="-34" y="-24" width="68" height="48" rx="2"/></g>
    <g class="pile-sheet" transform="rotate(-2)">
      <rect x="-34" y="-24" width="68" height="48" rx="2"/>
      <line class="pile-line" x1="-22" y1="-10" x2="18" y2="-10"/>
      <line class="pile-line" x1="-22" y1="-1" x2="22" y2="-1"/>
      <line class="pile-line" x1="-22" y1="8" x2="10" y2="8"/>
    </g>
  </g>

  <!-- ================= gear (automation engine) ================= -->
  <circle class="gear-halo" cx="450" cy="160" r="80"/>
  <g class="gear-rotor">
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(0 450 160)"/>
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(45 450 160)"/>
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(90 450 160)"/>
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(135 450 160)"/>
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(180 450 160)"/>
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(225 450 160)"/>
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(270 450 160)"/>
    <rect class="tooth" x="442.0" y="96" width="16" height="24" rx="2" transform="rotate(315 450 160)"/>
    <circle class="gear-hub" cx="450" cy="160" r="42"/>
    <circle class="gear-hole" cx="450" cy="160" r="14"/>
  </g>

  <!-- ================= static completed pile (right) ================= -->
  <g transform="translate(745,180)">
    <g transform="rotate(4)"><rect class="done-card" x="-34" y="-24" width="68" height="48" rx="3"/></g>
    <g transform="rotate(-3)"><rect class="done-card" x="-34" y="-24" width="68" height="48" rx="3"/></g>
    <g transform="rotate(1)">
      <rect class="done-card" x="-34" y="-24" width="68" height="48" rx="3"/>
      <path class="done-check" d="M-12 0L-3 9L14 -10"/>
    </g>
  </g>

  <!-- ================= traveling documents (3 staggered) ================= -->
  <g class="doc doc-set-1">
    <g class="doc-paper" transform="translate(170,160)">
      <rect x="-20" y="-26" width="40" height="52" rx="2"/>
      <line x1="-11" y1="-12" x2="11" y2="-12"/>
      <line x1="-11" y1="-2" x2="11" y2="-2"/>
      <line x1="-11" y1="8" x2="4" y2="8"/>
    </g>
    <g class="doc-card" transform="translate(450,160)">
      <rect x="-20" y="-26" width="40" height="52" rx="3"/>
      <path class="check" d="M-9 0L-2 8L11 -9"/>
    </g>
  </g>

  <g class="doc doc-set-2">
    <g class="doc-paper" transform="translate(170,160)">
      <rect x="-20" y="-26" width="40" height="52" rx="2"/>
      <line x1="-11" y1="-12" x2="11" y2="-12"/>
      <line x1="-11" y1="-2" x2="11" y2="-2"/>
      <line x1="-11" y1="8" x2="4" y2="8"/>
    </g>
    <g class="doc-card" transform="translate(450,160)">
      <rect x="-20" y="-26" width="40" height="52" rx="3"/>
      <path class="check" d="M-9 0L-2 8L11 -9"/>
    </g>
  </g>

  <g class="doc doc-set-3">
    <g class="doc-paper" transform="translate(170,160)">
      <rect x="-20" y="-26" width="40" height="52" rx="2"/>
      <line x1="-11" y1="-12" x2="11" y2="-12"/>
      <line x1="-11" y1="-2" x2="11" y2="-2"/>
      <line x1="-11" y1="8" x2="4" y2="8"/>
    </g>
    <g class="doc-card" transform="translate(450,160)">
      <rect x="-20" y="-26" width="40" height="52" rx="3"/>
      <path class="check" d="M-9 0L-2 8L11 -9"/>
    </g>
  </g>

</svg>